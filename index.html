<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода - Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather App</h1>
            <p>Проверьте погоду в вашем городе</p>
        </header>

        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Введите название города..." 
                class="search-input"
            >
            <button id="searchBtn" class="search-btn">Поиск</button>
            <button id="locationBtn" class="location-btn">📍 Моё местоположение</button>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div id="weatherContainer" class="weather-container hidden">
            <!-- Текущая погода -->
            <div class="current-weather">
                <div class="city-info">
                    <h2 id="cityName"></h2>
                    <p id="date"></p>
                </div>
                <div class="weather-main">
                    <img id="weatherIcon" src="" alt="Погода" class="weather-icon">
                    <div class="temp-info">
                        <div id="temperature" class="temperature"></div>
                        <p id="description" class="description"></p>
                    </div>
                </div>
            </div>

            <!-- Детали погоды -->
            <div class="weather-details">
                <div class="detail-item">
                    <span class="detail-label">💧 Влажность</span>
                    <span id="humidity" class="detail-value"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">💨 Ветер</span>
                    <span id="windSpeed" class="detail-value"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">🔽 Давление</span>
                    <span id="pressure" class="detail-value"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">👁️ Видимость</span>
                    <span id="visibility" class="detail-value"></span>
                </div>
            </div>

            <!-- Прогноз на 5 дней -->
            <div class="forecast-section">
                <h3>Прогноз на 5 дней</h3>
                <div id="forecastContainer" class="forecast-container"></div>
            </div>
        </div>

        <footer>
            <p>Данные получены от OpenWeatherMap API</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
