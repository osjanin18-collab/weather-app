<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤️ Weather App - Красивая погода</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🌤️</text></svg>">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🌤️</span>
                    <h1>Weather App</h1>
                </div>
                <p class="subtitle">Красивая погода в реальном времени</p>
            </div>
        </header>

        <div class="search-card">
            <div class="search-wrapper">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Введите название города..." 
                    class="search-input"
                    autocomplete="off"
                >
                <button id="searchBtn" class="search-btn">
                    <span class="btn-icon">🔍</span>
                    <span>Поиск</span>
                </button>
            </div>
            <button id="locationBtn" class="location-btn">
                <span class="btn-icon">📍</span>
                <span>Мое местоположение</span>
            </button>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div id="weatherContainer" class="weather-container hidden">
            <!-- Текущая погода -->
            <div class="current-weather-card">
                <div class="weather-header">
                    <div class="city-info">
                        <h2 id="cityName"></h2>
                        <p id="date" class="date-info"></p>
                    </div>
                    <img id="weatherIcon" src="" alt="Погода" class="main-weather-icon">
                </div>
                <div class="temperature-section">
                    <div id="temperature" class="temperature"></div>
                    <p id="description" class="weather-description"></p>
                </div>
            </div>

            <!-- Детали погоды -->
            <div class="weather-details">
                <div class="detail-card">
                    <div class="detail-icon">💧</div>
                    <div class="detail-content">
                        <span class="detail-label">Влажность</span>
                        <span id="humidity" class="detail-value"></span>
                    </div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon">💨</div>
                    <div class="detail-content">
                        <span class="detail-label">Ветер</span>
                        <span id="windSpeed" class="detail-value"></span>
                    </div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon">🔽</div>
                    <div class="detail-content">
                        <span class="detail-label">Давление</span>
                        <span id="pressure" class="detail-value"></span>
                    </div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon">👁️</div>
                    <div class="detail-content">
                        <span class="detail-label">Видимость</span>
                        <span id="visibility" class="detail-value"></span>
                    </div>
                </div>
            </div>

            <!-- Прогноз на 5 дней -->
            <div class="forecast-section">
                <h3 class="forecast-title">📅 Прогноз на 5 дней</h3>
                <div id="forecastContainer" class="forecast-container"></div>
            </div>
        </div>

        <div class="empty-state" id="emptyState">
            <div class="empty-icon">🌍</div>
            <p>Введите название города или используйте геолокацию</p>
        </div>
    </div>

    <footer class="footer">
        <p>Powered by OpenWeatherMap API</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
